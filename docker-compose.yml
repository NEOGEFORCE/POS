services:
  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_DB: ${DB_NAME:-sistemapos}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sistemapos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backPOS-go
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123}
      DB_NAME: ${DB_NAME:-sistemapos}
      PORT: 3000
      SECRET_KEY: ${SECRET_KEY:-pos_secret_key_2024}
    ports:
      - "3001:3000"

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./FrontPOS-main
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:3000
    container_name: pos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "9003:3000"

volumes:
  postgres_data:
